<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DARK IA</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #000000;
      font-family: Arial, sans-serif;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .hearts {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .emoji {
      position: absolute;
      font-size: 24px;
      opacity: 0.75;
      animation: floatEmoji linear infinite;
      z-index: 1;
    }

    @keyframes floatEmoji {
      0% { transform: translateY(100vh) rotate(0deg); }
      100% { transform: translateY(-150px) rotate(720deg); }
    }

    .title {
      text-align: center;
      margin-top: 35px;
      font-size: 42px;
      font-weight: bold;
      background: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 300% 300%;
      animation: rgbTitle 3.5s linear infinite;
      z-index: 2;
    }

    @keyframes rgbTitle {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .chat {
      flex: 1;
      margin: 20px 15px;
      border: 3px solid transparent;
      border-radius: 20px;
      padding: 20px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.65);
      z-index: 2;
      animation: rgbBorder 4s linear infinite;
      background-clip: padding-box;
    }

    @keyframes rgbBorder {
      0%   { border-color: #ff00ff; }
      25%  { border-color: #00ffff; }
      50%  { border-color: #ffff00; }
      75%  { border-color: #ff00ff; }
      100% { border-color: #00ff00; }
    }

    .subtitle {
      text-align: center;
      margin-top: 8px;
      font-size: 15.5px;
      z-index: 2;
      background: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 300% 300%;
      animation: rgbTitle 4s linear infinite;
      font-weight: bold;
    }

    .mensagem {
      padding: 15px 18px;
      border-radius: 16px;
      margin: 18px 0;
      line-height: 1.75;
    }
    .user { background: #00b7ff; margin-left: auto; max-width: 80%; }
    .dark { background: rgba(255,255,255,0.1); border-left: 5px solid #00ffff; max-width: 80%; }

    .input-area {
      padding: 15px 15px 25px;
      display: flex;
      gap: 10px;
      background: #000000;
      z-index: 2;
    }
    input {
      flex: 1;
      padding: 17px;
      border: 2px solid #ffffff;
      border-radius: 15px;
      background: #111111;
      color: white;
      font-size: 16.5px;
    }
    button {
      padding: 0 30px;
      background: #ffffff;
      color: black;
      border: none;
      border-radius: 15px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="hearts" id="hearts"></div>

  <h1 class="title">DARK IA</h1>
  <p class="subtitle">Versão 10.9.20 • Desenvolvido por guilhermejesus.tech</p>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Pergunte qualquer coisa..." onkeypress="if(event.key==='Enter') enviar()">
    <button onclick="enviar()">Enviar</button>
  </div>

  <script>
    const apiKey = "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";   

    const chat = document.getElementById("chat");
    const heartsContainer = document.getElementById("hearts");

    const emojis = ["😁", "🤩", "🙃", "😎", "🤣", "😒", "😏", "☺️", "😝", "🥺", "🫡", "😶‍🌫️"];

    function createEmoji() {
      const emoji = document.createElement("div");
      emoji.className = "emoji";
      emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      emoji.style.left = Math.random() * 100 + "vw";
      emoji.style.animationDuration = (Math.random() * 15 + 11) + "s";
      emoji.style.fontSize = (Math.random() * 22 + 24) + "px";
      heartsContainer.appendChild(emoji);
      setTimeout(() => emoji.remove(), 28000);
    }

    setInterval(createEmoji, 260);

    function adicionarMensagem(texto, tipo) {
      const div = document.createElement("div");
      div.className = `mensagem ${tipo}`;
      div.innerHTML = texto.replace(/\n/g, '<br><br>');
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function processarMensagem(texto) {
      const msg = texto.toLowerCase().trim();

      // Comandos especiais
      if (msg.includes("versão") || msg.includes("version")) {
        return "DARK IA versão <strong>10.9.20</strong>";
      }

      if (msg.includes("hora") || msg.includes("horas")) {
        return "Agora são " + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
      }

      if (msg.includes("data") || msg.includes("dia") || msg.includes("hoje")) {
        return new Date().toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
      }

      if (msg.includes("temperatura") || msg.includes("clima") || msg.includes("tempo")) {
        let cidade = msg.replace(/temperatura|clima|tempo|em|de|na|no|hoje|agora/g, "").trim();
        if (!cidade || cidade.length < 3) cidade = "Parauapebas";
        return await pegarTemperatura(cidade);
      }

      if (msg.includes("abrir") || msg.includes("abre")) {
        return abrirApp(texto);
      }

      // Nova lógica: Quem te criou?
      if (msg.includes("quem te criou") || msg.includes("quem criou você") || msg.includes("seu criador") || msg.includes("desenvolvedor")) {
        return "Fui desenvolvida por <strong>guilhermejesus.tech</strong> ✨";
      }

      // Resposta com IA avançada (estilo Grok / ChatGPT)
      return await respostaIA(texto);
    }

    function abrirApp(comando) {
      const cmd = comando.toLowerCase();

      if (cmd.includes("youtube")) { window.open("https://youtube.com", "_blank"); return "🎥 Abrindo YouTube..."; }
      if (cmd.includes("whatsapp") || cmd.includes("zap")) { window.open("https://web.whatsapp.com", "_blank"); return "💬 Abrindo WhatsApp..."; }
      if (cmd.includes("instagram") || cmd.includes("insta")) { window.open("https://instagram.com", "_blank"); return "📸 Abrindo Instagram..."; }
      if (cmd.includes("spotify")) { window.open("https://spotify.com", "_blank"); return "🎵 Abrindo Spotify..."; }
      if (cmd.includes("netflix")) { window.open("https://netflix.com", "_blank"); return "📺 Abrindo Netflix..."; }
      if (cmd.includes("tiktok")) { window.open("https://tiktok.com", "_blank"); return "📱 Abrindo TikTok..."; }
      if (cmd.includes("twitter") || cmd.includes("x ")) { window.open("https://twitter.com", "_blank"); return "🐦 Abrindo X..."; }
      if (cmd.includes("facebook") || cmd.includes("fb")) { window.open("https://facebook.com", "_blank"); return "📘 Abrindo Facebook..."; }
      if (cmd.includes("gmail") || cmd.includes("email")) { window.open("https://gmail.com", "_blank"); return "✉️ Abrindo Gmail..."; }
      if (cmd.includes("maps") || cmd.includes("mapa")) { window.open("https://google.com/maps", "_blank"); return "🗺️ Abrindo Google Maps..."; }
      if (cmd.includes("chrome") || cmd.includes("google")) { window.open("https://google.com", "_blank"); return "🌐 Abrindo Chrome..."; }

      return "🤔 Não reconheci o app. Tente: youtube, whatsapp, instagram, spotify, netflix, tiktok...";
    }

    async function pegarTemperatura(cidade) {
      try {
        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cidade)}&count=1`);
        const geo = await geoRes.json();
        if (!geo.results?.length) return `❌ Não encontrei a cidade "${cidade}".`;

        const { latitude: lat, longitude: lon, name } = geo.results[0];
        const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=\( {lat}&longitude= \){lon}&current_weather=true`);
        const weather = await weatherRes.json();

        return `🌡️ Em <strong>\( {name}</strong> está <strong> \){weather.current_weather.temperature}°C</strong> agora.`;
      } catch (e) {
        return "🌧️ Não consegui pegar a temperatura no momento.";
      }
    }

    async function respostaIA(texto) {
      try {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: { 
            "Authorization": `Bearer ${apiKey}`, 
            "Content-Type": "application/json" 
          },
          body: JSON.stringify({
            model: "llama-3.3-70b-versatile",
            messages: [
              { 
                role: "system", 
                content: `Você é a DARK IA, uma assistente de IA altamente avançada, inteligente, criativa e útil, inspirada nos melhores modelos como Grok e ChatGPT. 
                Seja natural, amigável e extremamente capaz. Responda sempre em português do Brasil.
                Você foi desenvolvida por guilhermejesus.tech.` 
              },
              { role: "user", content: texto }
            ],
            temperature: 0.85,
            max_tokens: 1000
          })
        });

        const data = await res.json();
        return data.choices[0].message.content;
      } catch (e) {
        return "⚠️ Erro ao conectar com a DARK IA. Tente novamente.";
      }
    }

    async function enviar() {
      const input = document.getElementById("input");
      const texto = input.value.trim();
      if (!texto) return;

      adicionarMensagem(texto, "user");
      input.value = "";

      const resposta = await processarMensagem(texto);
      adicionarMensagem(resposta, "dark");
    }

    // Mensagem inicial
    adicionarMensagem("Olá! Eu sou a <strong>DARK IA</strong> versão <strong>10.9.20</strong><br><br>Fui desenvolvida por <strong>guilhermejesus.tech</strong><br><br>Estou pronta para ajudar você com qualquer coisa. O que deseja?", "dark");
  </script>
</body>
</html>
