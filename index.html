<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DARK IA</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#050505;
  color:#fff;
  overflow:hidden;
  height:100vh;
  display:flex;
  flex-direction:column;
  transition:.4s;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* FUNDO */

.bg{
  position:fixed;
  width:100%;
  height:100%;
  overflow:hidden;
  z-index:1;
}

.part{
  position:absolute;
  bottom:-60px;
  opacity:.15;
  animation:subir linear infinite;
}

@keyframes subir{

  0%{
    transform:
    translateY(0)
    rotate(0deg)
    scale(.7);
    opacity:0;
  }

  10%{
    opacity:.2;
  }

  100%{
    transform:
    translateY(-120vh)
    rotate(360deg)
    scale(1.2);
    opacity:0;
  }
}

/* HEADER */

.header{
  position:relative;
  z-index:3;
  padding:18px;
  text-align:center;
  background:#0a0a0ad9;
  backdrop-filter:blur(20px);
  border-bottom:1px solid #ffffff10;
}

.logo{
  font-size:34px;
  font-weight:bold;
  letter-spacing:5px;
}

.logo span{
  color:#00ffff;
}

.sub{
  margin-top:6px;
  color:#777;
  font-size:12px;
  letter-spacing:3px;
  text-transform:uppercase;
}

/* CUSTOM */

.custom-box{
  position:relative;
  z-index:3;
  display:flex;
  gap:10px;
  padding:12px;
  overflow-x:auto;
  background:#080808;
  border-bottom:1px solid #ffffff10;
}

.custom-box select,
.custom-box input,
.custom-box button{

  border:none;
  outline:none;
  padding:10px 14px;
  border-radius:14px;
  background:#111;
  color:white;
  cursor:pointer;
  min-height:45px;
}

/* CHAT */

.chat{
  flex:1;
  overflow-y:auto;
  padding:18px;
  position:relative;
  z-index:2;
}

.msg{
  max-width:80%;
  padding:16px;
  border-radius:20px;
  margin:14px 0;
  line-height:1.8;
  font-size:15px;
  letter-spacing:.5px;
  word-wrap:break-word;
}

.user{
  margin-left:auto;
  background:#151515;
  border:1px solid #ffffff10;
}

.bot{
  background:#0f0f0f;
  border:1px solid #00ffff20;
}

/* INPUT */

.area{
  position:relative;
  z-index:3;
  display:flex;
  gap:10px;
  padding:15px;
  background:#080808;
  border-top:1px solid #ffffff10;
}

.input{
  flex:1;
  background:#121212;
  border:none;
  outline:none;
  border-radius:18px;
  padding:16px;
  color:white;
  font-size:15px;
}

.btn{
  width:60px;
  border:none;
  border-radius:18px;
  background:#00ffff;
  color:#000;
  font-size:20px;
  cursor:pointer;
}

audio{
  width:100%;
  margin-top:10px;
}

img{
  width:100%;
  border-radius:16px;
  margin-top:10px;
}

</style>
</head>
<body>

<!-- FUNDO -->

<div class="bg" id="bg"></div>

<!-- HEADER -->

<div class="header">

<div class="logo">
DARK <span>IA</span>
</div>

<div class="sub">
Projeto criado por GuilhermeJesus.tech
</div>

</div>

<!-- CUSTOMIZAÇÃO -->

<div class="custom-box">

<select id="emojiSelect" onchange="trocarEmoji()">

<option value="🤩">🤩</option>
<option value="☺️">☺️</option>
<option value="😏">😏</option>
<option value="😎">😎</option>
<option value="😶‍🌫️">😶‍🌫️</option>
<option value="🥰">🥰</option>
<option value="😁">😁</option>
<option value="😝">😝</option>

</select>

<input
type="color"
id="corFundo"
oninput="mudarCorFundo()"
value="#050505"
>

<input
type="color"
id="corTexto"
oninput="mudarCorTexto()"
value="#ffffff"
>

<input
type="file"
accept="image/*"
onchange="mudarFotoFundo(event)"
>

<input
type="file"
accept="audio/*"
onchange="carregarMusica(event)"
>

<button onclick="modoEscuro()">
PRETO
</button>

<button onclick="modoBranco()">
BRANCO
</button>

</div>

<!-- CHAT -->

<div class="chat" id="chat"></div>

<!-- INPUT -->

<div class="area">

<input
type="text"
id="input"
class="input"
placeholder="Pergunte algo..."
onkeypress="if(event.key==='Enter') enviar()"
>

<button
class="btn"
onclick="enviar()"
>
➜
</button>

</div>

<script>

/* API */

const apiKey = "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";

/* CHAT */

const chat =
document.getElementById("chat");

/* EMOJI */

let emojiAtual = "✦";

/* TROCAR EMOJI */

function trocarEmoji(){

emojiAtual =
document
.getElementById("emojiSelect")
.value;

}

/* PARTÍCULAS */

function particula(){

const p =
document.createElement("div");

p.className = "part";

p.innerText =
emojiAtual;

p.style.left =
Math.random()*100 + "%";

p.style.fontSize =
(Math.random()*25+10)
+"px";

p.style.color =
[
"#00ffff",
"#00ffaa",
"#ffffff"
][
Math.floor(Math.random()*3)
];

p.style.animationDuration =
(Math.random()*10+8)
+"s";

document
.getElementById("bg")
.appendChild(p);

setTimeout(()=>{

p.remove();

},20000);

}

for(let i=0;i<60;i++){

setTimeout(
particula,
i*100
);

}

setInterval(
particula,
300
);

/* CUSTOM */

function mudarCorFundo(){

const cor =
document
.getElementById("corFundo")
.value;

document.body.style.background =
cor;

document.body.style.backgroundImage =
"none";

}

function mudarCorTexto(){

const cor =
document
.getElementById("corTexto")
.value;

document.body.style.color =
cor;

}

function mudarFotoFundo(event){

const arquivo =
event.target.files[0];

if(!arquivo) return;

const leitor =
new FileReader();

leitor.onload =
function(e){

document.body.style.backgroundImage =
`url('${e.target.result}')`;

};

leitor.readAsDataURL(arquivo);

}

function modoEscuro(){

document.body.style.background =
"#050505";

document.body.style.color =
"#ffffff";

document.body.style.backgroundImage =
"none";

}

function modoBranco(){

document.body.style.background =
"#f1f1f1";

document.body.style.color =
"#000000";

document.body.style.backgroundImage =
"none";

}

/* MÚSICA */

function carregarMusica(event){

const arquivo =
event.target.files[0];

if(!arquivo) return;

const url =
URL.createObjectURL(arquivo);

const audio =
document.createElement("audio");

audio.controls = true;

audio.autoplay = true;

audio.src = url;

chat.appendChild(audio);

chat.scrollTop =
chat.scrollHeight;

mensagem(
"Playlist carregada com sucesso.",
"bot"
);

}

/* MENSAGEM */

function mensagem(
texto,
tipo
){

const div =
document.createElement("div");

div.className =
`msg ${tipo}`;

div.innerHTML =
texto.replace(/\n/g,"<br>");

chat.appendChild(div);

chat.scrollTop =
chat.scrollHeight;

}

/* IMAGEM */

async function criarImagem(prompt){

const img =
document.createElement("img");

img.src =
`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;

chat.appendChild(img);

chat.scrollTop =
chat.scrollHeight;

}

/* ABRIR APPS */

function abrirAplicativo(msg){

const apps = {

youtube:
"https://youtube.com",

google:
"https://google.com",

instagram:
"https://instagram.com",

spotify:
"https://spotify.com",

github:
"https://github.com",

whatsapp:
"https://web.whatsapp.com",

netflix:
"https://netflix.com",

facebook:
"https://facebook.com",

tiktok:
"https://tiktok.com",

gmail:
"https://gmail.com",

maps:
"https://maps.google.com",

telegram:
"https://web.telegram.org",

twitter:
"https://twitter.com",

discord:
"https://discord.com/app",

chrome:
"https://google.com",

drive:
"https://drive.google.com",

linkedin:
"https://linkedin.com"

};

for(let app in apps){

if(msg.includes(app)){

window.open(
apps[app],
"_blank"
);

return `
Abrindo ${app}...
`;

}

}

return `
Aplicativo não encontrado.
`;

}

/* IA */

async function ia(texto){

try{

const req =
await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{

method:"POST",

headers:{

"Authorization":
`Bearer ${apiKey}`,

"Content-Type":
"application/json"

},

body:JSON.stringify({

model:
"llama-3.3-70b-versatile",

messages:[

{
role:"system",

content:`

Você é a DARK IA.

Você foi criada por
GuilhermeJesus.tech.

Você é moderna,
organizada,
profissional,
inteligente
e amigável.

`

},

{
role:"user",
content:texto
}

],

temperature:0.8,
max_tokens:1000

})

}
);

const data =
await req.json();

return data
.choices[0]
.message.content;

}catch{

return `
Erro de conexão.
`;

}

}

/* PROCESSAR */

async function processar(texto){

const msg =
texto.toLowerCase();

if(
msg.includes("quem criou")
){

return `
Projeto criado por
GuilhermeJesus.tech
`;

}

if(
msg.includes("hora")
){

return `
${new Date().toLocaleTimeString("pt-BR")}
`;

}

if(
msg.includes("data")
){

return `
${new Date().toLocaleDateString("pt-BR")}
`;

}

if(
msg.includes("abrir") ||
msg.includes("abre")
){

return abrirAplicativo(msg);

}

if(
msg.includes("cria imagem")
){

const prompt =
texto.replace(
"cria imagem",
""
);

await criarImagem(prompt);

return `
Imagem criada.
`;

}

return await ia(texto);

}

/* ENVIAR */

async function enviar(){

const input =
document.getElementById("input");

const texto =
input.value.trim();

if(!texto) return;

mensagem(
texto,
"user"
);

input.value = "";

mensagem(
"Processando...",
"bot"
);

const resposta =
await processar(texto);

chat.lastChild.remove();

mensagem(
resposta,
"bot"
);

}

</script>
</body>
</html>
